name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-data:
    name: Validate data files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Go (for gitleaks CLI)
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install gitleaks CLI
        run: |
          set -e
          # install gitleaks via 'go install' so we avoid the GitHub Action wrapper which requires a license
          go install github.com/zricethezav/gitleaks/v8@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Run gitleaks (detect)
        run: |
          # Use the repository config and allowlist; produce JSON report
          $HOME/go/bin/gitleaks detect --source . --config .gitleaks.toml --report-format json --report-path gitleaks-report.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate JSON data
        run: npm run validate-data

  lint-and-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: /GlobalOfficeFinder/
