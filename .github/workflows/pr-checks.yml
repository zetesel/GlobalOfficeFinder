name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-data:
    name: Validate data files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan (gitleaks)
        uses: zricethezav/gitleaks-action@v8
        with:
          # Use repository config (.gitleaks.toml) and check the full diff/PR contents
          args: -v
        # Fail early on detected secrets
        continue-on-error: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate JSON data
        run: npm run validate-data

  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: /GlobalOfficeFinder/
