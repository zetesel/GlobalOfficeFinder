name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, cancelling in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate-data:
    name: Validate data files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scan (heuristic)
        run: |
          # Run the same lightweight heuristic secret scan as in PR checks
          python3 - <<'PY'
          import re,sys,os
          exclude_dirs = {'.git','node_modules','dist','public','.github'}
          exclude_files = {'./.gitleaks.toml','./.gitleaksignore','./gitleaks-report.json'}
          patterns = [
            (re.compile(r'AKIA[0-9A-Z]{16}'), 'AWS Access Key ID'),
            (re.compile(r'-----BEGIN (?:RSA )?PRIVATE KEY-----'), 'Private Key'),
            (re.compile(r'\b(?:api[_-]?key|apikey|access[_-]?token|secret[_-]?key)\b', re.I), 'Generic API Key'),
            (re.compile(r'gh[p|a|s|u|r]_[A-Za-z0-9_]{36,}'), 'GitHub token'),
            (re.compile(r'xox[baprs]-[0-9a-zA-Z-]{10,}'), 'Slack token'),
          ]

          matches = []
          for root, dirs, files in os.walk('.'):
              if any(part in exclude_dirs for part in root.split(os.sep)):
                  continue
              for name in files:
                  path = os.path.join(root, name)
                  if path in exclude_files or path.startswith('./.github/'):
                      continue
                  try:
                      data = open(path, 'rb').read().decode('utf-8', errors='ignore')
                  except Exception:
                      continue
                  for pat, label in patterns:
                      if pat.search(data):
                          matches.append((path, label))

          if matches:
              print('Possible secrets detected:')
              for p,l in matches:
                  print('-', l, 'in', p)
              sys.exit(1)
          else:
              print('No obvious secrets found (heuristic scan)')
          PY

      - name: Validate JSON data
        run: npm run validate-data

  build:
    name: Build site
    needs: validate-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: /GlobalOfficeFinder/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
