name: Full Repository Secret Scan

# Runs on every push to main and on a daily schedule to catch secrets in history.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"  # daily at 02:00 UTC

permissions:
  contents: read  # only need read access to the repo

jobs:
  secret-scan:
    name: Full History Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history for scanning
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Install gitleaks CLI
        run: |
          set -e
          go install github.com/zricethezav/gitleaks/v8@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Run full-history gitleaks scan
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format json \
            --report-path full-gitleaks-report.json \
            --verbose

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: full-gitleaks-report
          path: full-gitleaks-report.json
