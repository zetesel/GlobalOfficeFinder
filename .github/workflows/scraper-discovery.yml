name: Scraper Discovery

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run scraper without mutating data files"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "30 3 * * 1"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  discover-and-pr:
    name: Discover companies and open PR
    runs-on: ubuntu-latest
    env:
      SCRAPER_BOT_TOKEN: ${{ secrets.SCRAPER_BOT_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scraper (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: npm run scrape:companies:dry

      - name: Run scraper
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        run: npm run scrape:companies

      - name: Validate JSON data
        run: npm run validate-data

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --run

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: /GlobalOfficeFinder/

      - name: Create Pull Request (using SCRAPER_BOT_TOKEN if available)
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        run: echo "Creating PR using available token..."

      - name: Create Pull Request with bot token
        if: (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true') && env.SCRAPER_BOT_TOKEN != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.SCRAPER_BOT_TOKEN }}
          branch: automation/scraper-discovery
          delete-branch: true
          title: "chore(data): automated scraper discovery update"
          commit-message: "chore(data): update discovered companies and offices"
          body: |
            ## Summary
            - ran automated discovery + enrichment pipeline
            - normalized and deduplicated company/office records
            - geocoded missing office coordinates
            - updated scraper run metadata and review queue

            ## Validation
            - npm run validate-data
            - npm run lint
            - npm run test -- --run
            - npm run build
          labels: |
            data
            automation
          add-paths: |
            data/companies.json
            data/offices.json
            data/scraper/last-run.json
            data/scraper/review-queue.json

      - name: Push discovery branch for manual PR fallback
        id: fallback_push
        if: (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true') && env.SCRAPER_BOT_TOKEN == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin automation/scraper-discovery:refs/remotes/origin/automation/scraper-discovery || true
          git checkout -B automation/scraper-discovery
          git add data/companies.json data/offices.json data/scraper/last-run.json data/scraper/review-queue.json

          if git diff --cached --quiet; then
            echo "No changes to commit; skipping branch push."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore(data): update discovered companies and offices"
          git push --force-with-lease --set-upstream origin automation/scraper-discovery
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Create Issue to Request PR (fallback)
        if: (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true') && env.SCRAPER_BOT_TOKEN == '' && steps.fallback_push.outputs.pushed == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = 'automation/scraper-discovery';
            const title = `Automated scraper run: review branch ${branch}`;
            const body = `An automated scraper run pushed changes to \`${branch}\` but the repository is configured to disallow Actions from creating pull requests.\n\nPlease review the branch and create a PR manually, or add a repository secret named \`SCRAPER_BOT_TOKEN\` with a PAT that has repo permissions to permit automated PR creation.\n\nFiles changed: data/companies.json, data/offices.json, data/scraper/last-run.json, data/scraper/review-queue.json\n\nRun generated by workflow: ${{ github.workflow }} on ${{ github.ref }}.`;
            const { owner, repo } = context.repo;
            // actions/github-script exposes Octokit on `github.rest` in newer action versions
            // use the REST API client to create the issue
            await github.rest.issues.create({ owner, repo, title, body, labels: ['data','automation'] });
