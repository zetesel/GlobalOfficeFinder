name: Scraper Security Gate
on:
  push:
  pull_request:
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit (production)
        run: |
          mkdir -p data/security
          npm audit --production --json > data/security/audit.json
      - name: Check audit results (fail on high/critical)
        run: node scripts/security/check-audit.mjs
