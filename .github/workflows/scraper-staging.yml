name: Scraper Staging

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1' # weekly on Monday at 03:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install
        run: npm ci

      - name: Run scraper (staging)
        env:
          SCRAPER_STAGING: '1'
          SCRAPER_AUTO_DISCOVER: '1'
          SCRAPER_AUTO_ACCEPT: '1'
          SCRAPER_GEOCODE: '1'
          SCRAPER_MIN_CONFIDENCE: 'low'
        run: |
          node scripts/scraper/run-scraper.mjs

      - name: Commit staging files
        run: |
          echo "SCRAPER_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin scraper/staging:refs/remotes/origin/scraper/staging || true
          git checkout -B scraper/staging
          git add data/companies-staging.json data/offices-staging.json data/scraper/collected-pages.json data/scraper/proposed-accepts.json data/scraper/top-proposals.json || true
          git commit -m "scraper: staging run $(date -u +%Y-%m-%d)" || echo "no changes to commit"
          git push --force-with-lease --set-upstream origin scraper/staging

      - name: Create PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Scraper staging run: ${{ env.SCRAPER_DATE }}"
          body: |
            Automated scraper staging run. Please review the staging data before promoting:
            - `data/companies-staging.json`
            - `data/offices-staging.json`
            - `data/scraper/collected-pages.json` (confidence + provenance)
            - `data/scraper/proposed-accepts.json`
            - `data/scraper/top-proposals.json`

            This run may include auto-accepted candidates.
          base: main
          branch: scraper/staging
