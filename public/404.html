<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GlobalOfficeFinder</title>
    <script>
      // GitHub Pages SPA fallback: redirect 404s back to index.html
      // Encode the path into the query string so the app can restore it.
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 2).join("/") +
          "/?p=" +
          encodeURIComponent(
            l.pathname.slice(1) + (l.search ? "&" + l.search.slice(1) : "") + l.hash
          )
      );
    </script>
  </head>
  <body></body>
</html>
