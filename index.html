<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Content Security Policy: locked down to known hosts -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      img-src 'self' data: https://*.basemaps.cartocdn.com https://images.pexels.com https://upload.wikimedia.org;
      font-src 'self' data: https://fonts.gstatic.com;
      connect-src 'self' https://*.basemaps.cartocdn.com ws://localhost:* ws://127.0.0.1:* http://localhost:* http://127.0.0.1:*;
      frame-ancestors 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self'
    " />

    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=(), payment=()" />

    <title>GlobalOfficeFinder — Discover Company Offices Worldwide</title>
    <meta name="description" content="Browse company offices around the world. Search by company, city, country, region, industry, or office type." />
    <meta name="theme-color" content="#2f45ff" />
    <meta name="color-scheme" content="light" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin />

    <script src="/spa-redirect.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
