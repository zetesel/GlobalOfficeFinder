<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- Content Security Policy: Restrict resource loading to self; allow inline styles required by the app and Leaflet -->
    <!-- This is the meta-tag version for static hosting (GitHub Pages doesn't support custom headers) -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https:;
      font-src 'self' data:;
      connect-src 'self' https://tile.openstreetmap.org ws://localhost:* ws://127.0.0.1:* http://localhost:* http://127.0.0.1:*;
      frame-ancestors 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self'
    " />
    
    <!-- Additional security headers (via meta tags where meta tags are supported) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=(), payment=()" />
    
    <title>GlobalOfficeFinder — Discover Company Offices Worldwide</title>
    <meta name="description" content="Search for company offices worldwide. Filter by country, region, and industry to find where your company of interest operates globally." />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />
    
    <script src="/spa-redirect.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
